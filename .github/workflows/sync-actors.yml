name: Sync actors list
# Keeps the MCP toolkit (server.json/README) + Smithery release + official MCP
# registry in sync with the live Apify portfolio. Runs in the cloud — no local
# machine needed.
# Secrets: APIFY_TOKEN2 (Apify token, verify + portfolio read), SMITHERY (Smithery
# API key, release). The official-registry republish uses GitHub-Actions OIDC — no
# secret needed; the repo owner (hassanahashish-design) authorizes the matching
# io.github.hassanahashish-design/* namespace.

on:
  schedule:
    - cron: '0 12 * * *'   # daily, ~2h after the 1PM publish routine in any of its plausible timezones
    - cron: '0 16 * * *'   # idempotent safety net for late publishes
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write   # for OIDC auth to the official MCP registry

concurrency:
  group: sync-actors
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync + verify
        id: sync
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN2 }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY }}
        run: node scripts/sync-actors.mjs

      - name: Commit & push
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "actor-sync"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json README.md LISTINGS.md
          git commit -m "sync actors list: ${{ steps.sync.outputs.summary_line }}"
          git push

      - name: Republish to official MCP registry
        # Runs after commit so the published server.json matches the repo. The sync
        # script bumps server.json version on every change, so the registry never
        # sees a duplicate-version rejection. Non-fatal: a failure warns, not blocks.
        if: steps.sync.outputs.changed == 'true'
        continue-on-error: true
        run: |
          url=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | jq -r '.assets[] | select(.name=="mcp-publisher_linux_amd64.tar.gz") | .browser_download_url')
          curl -sL "$url" -o mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
          echo "Republished server.json to the official MCP registry (seeds PulseMCP + Glama)."

      - name: Surface Smithery failure
        if: steps.sync.outputs.smithery == 'failed' || steps.sync.outputs.smithery == 'manual-needed'
        run: |
          echo "::warning::Smithery release not updated (${{ steps.sync.outputs.smithery }}) — see step summary"
          test "${{ steps.sync.outputs.smithery }}" = "manual-needed" || exit 1
